<!DOCTYPE html>
<html lang="zh-TW" id="html-root">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title id="page-title">Agentic Investment Committee</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233d4f9f'/%3E%3Cpath d='M8 21l5-6 4 3 7-9' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1 id="title">Agentic Investment Committee <span class="sub" id="subtitle"></span></h1>
  <div class="controls">
    <div class="market-switch">
      <label><input type="radio" name="market" value="tw" checked> TW</label>
      <label><input type="radio" name="market" value="us"> US</label>
    </div>
    <label id="ticker-label">股票代號:</label>
    <select id="stock-select"></select>
    <input id="ticker" type="text" maxlength="6" class="hidden" placeholder="代號 / code">
    <button id="run">開始分析</button>
  </div>
</header>

<section id="verdict"></section>
<section id="verify" class="hidden"></section>
<section id="status"></section>

<main>
  <aside id="pipeline">
    <h2 id="pipeline-heading">Pipeline</h2>
    <div id="cards">…</div>
  </aside>
  <article id="feed">
    <h2 id="debate-heading">Live debate</h2>
    <div id="messages"></div>
  </article>
</main>

<script src="/static/md.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
